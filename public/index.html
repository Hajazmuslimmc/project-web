<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NetTiers - Minecraft PvP Rankings</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0d0f14;--bg2:#13161d;--bg3:#1a1e28;--bg4:#222736;--border:#2a2f3e;--text:#e8eaf0;--muted:#7a8099;--accent:#f5a623;--gold:#f5c842;--silver:#c0c8d8;--bronze:#cd7f32;--ht:rgba(255,200,80,0.18);--ht-border:rgba(255,200,80,0.45);--red:#e05252;--green:#4caf7d;--blue:#4a90d9;--purple:#9b6de0;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;}
  /* NAV */
  nav{background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 28px;height:60px;position:sticky;top:0;z-index:100;}
  .logo{font-family:'Rajdhani',sans-serif;font-size:1.7rem;font-weight:700;color:var(--gold);letter-spacing:2px;}
  .logo span{color:#fff;}
  .nav-links{display:flex;gap:6px;align-items:center;}
  .nav-btn{background:none;border:none;color:var(--muted);cursor:pointer;padding:7px 14px;border-radius:8px;font-size:.88rem;font-family:'Inter',sans-serif;display:flex;align-items:center;gap:6px;transition:all .2s;text-decoration:none;}
  .nav-btn:hover,.nav-btn.active{background:var(--bg3);color:var(--text);}
  .discord-btn{color:#fff;background:rgba(88,101,242,.25);border:1px solid rgba(88,101,242,.5);}
  .discord-btn:hover{background:rgba(88,101,242,.45);border-color:#5865f2;}
  .nav-search{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:7px 14px;color:var(--text);font-family:'Inter',sans-serif;font-size:.85rem;width:200px;outline:none;transition:border .2s;}
  .nav-search:focus{border-color:var(--accent);}
  /* TABS */
  .tabs-wrap{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 28px;}
  .tabs{display:flex;gap:2px;overflow-x:auto;}
  .tab{display:flex;flex-direction:column;align-items:center;padding:14px 18px;cursor:pointer;color:var(--muted);border-bottom:3px solid transparent;font-size:.82rem;font-weight:500;white-space:nowrap;transition:all .2s;gap:4px;background:none;border-top:none;border-left:none;border-right:none;font-family:'Inter',sans-serif;}
  .tab .icon{font-size:1.3rem;}
  .tab:hover{color:var(--text);}
  .tab.active{color:var(--text);border-bottom-color:var(--accent);}
  /* CONTENT */
  .content{padding:28px;max-width:1300px;margin:0 auto;}
  /* OVERALL */
  .overall-list{display:flex;flex-direction:column;gap:8px;}
  .overall-row{background:var(--bg2);border:1px solid var(--border);border-radius:12px;display:flex;align-items:center;gap:18px;padding:14px 18px;transition:all .2s;cursor:pointer;}
  .overall-row:hover{border-color:var(--accent);transform:translateX(3px);}
  .rank-num{font-family:'Rajdhani',sans-serif;font-size:1.5rem;font-weight:700;min-width:36px;color:var(--muted);}
  .rank-num.r1{color:var(--gold);}
  .rank-num.r2{color:var(--silver);}
  .rank-num.r3{color:var(--bronze);}
  .player-avatar{width:50px;height:50px;border-radius:8px;background:var(--bg4);display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0;}
  .player-avatar img{width:100%;height:100%;object-fit:cover;border-radius:8px;display:block;}
  .player-info{flex:1;}
  .player-name{font-size:1.05rem;font-weight:600;}
  .player-title{font-size:.8rem;color:var(--muted);display:flex;align-items:center;gap:5px;margin-top:2px;}
  .region-tag{padding:4px 10px;border-radius:6px;font-size:.75rem;font-weight:700;background:var(--red);color:#fff;flex-shrink:0;}
  .region-tag.EU{background:var(--blue);}
  .region-tag.AS{background:var(--purple);}
  .tier-badges{display:flex;gap:5px;flex-wrap:wrap;}
  .tbadge{width:40px;height:40px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:.55rem;font-weight:700;border:2px solid transparent;}
  .tbadge .badge-icon{font-size:.9rem;line-height:1;}
  .tbadge .badge-label{font-size:.5rem;font-weight:700;line-height:1;}
  .tbadge.ht{background:var(--ht);border-color:var(--ht-border);color:var(--gold);}
  .tbadge.lt{background:var(--bg4);border-color:var(--border);color:var(--muted);}
  /* TIER GRID */
  .tier-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;}
  .tier-header{border-radius:10px 10px 0 0;padding:12px 14px;text-align:center;font-family:'Rajdhani',sans-serif;font-size:1.1rem;font-weight:700;display:flex;align-items:center;justify-content:center;gap:7px;margin-bottom:4px;}
  .tier-header.t1{background:linear-gradient(135deg,#a07b1a,#c9a84c);color:#fff;}
  .tier-header.t2{background:linear-gradient(135deg,#3a4255,#5a6a88);color:#fff;}
  .tier-header.t3{background:linear-gradient(135deg,#5a3010,#8a5020);color:#fff;}
  .tier-header.t4{background:var(--bg3);color:var(--text);border:1px solid var(--border);}
  .tier-header.t5{background:var(--bg3);color:var(--text);border:1px solid var(--border);}
  .tier-player{background:var(--bg2);border:1px solid var(--border);padding:9px 12px;display:flex;align-items:center;gap:9px;cursor:pointer;transition:all .2s;margin-bottom:3px;border-radius:7px;}
  .tier-player:hover{border-color:var(--accent);background:var(--bg3);}
  .tier-player.ht-player{background:var(--ht);border-color:var(--ht-border);}
  .tp-avatar{width:28px;height:28px;border-radius:5px;background:var(--bg4);display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden;}
  .tp-avatar img{width:100%;height:100%;object-fit:cover;border-radius:5px;display:block;}
  .tp-name{font-size:.82rem;font-weight:500;flex:1;}
  .tp-badge{font-size:.65rem;padding:2px 6px;border-radius:4px;font-weight:700;}
  .tp-badge.ht{background:rgba(245,200,66,.25);color:var(--gold);}
  .tp-badge.lt{background:var(--bg4);color:var(--muted);}
  .region-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
  .region-dot.NA{background:var(--red);}
  .region-dot.EU{background:var(--blue);}
  .region-dot.AS{background:var(--purple);}
  /* MODAL */
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:1000;align-items:center;justify-content:center;backdrop-filter:blur(5px);}
  .modal-overlay.show{display:flex;}
  .modal{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:28px;min-width:420px;max-width:480px;width:90vw;position:relative;box-shadow:0 24px 60px rgba(0,0,0,.6);animation:popIn .25s cubic-bezier(.34,1.56,.64,1);}
  @keyframes popIn{from{transform:scale(.85);opacity:0}to{transform:scale(1);opacity:1}}
  .modal-close{position:absolute;top:14px;right:14px;background:var(--bg4);border:1px solid var(--border);color:var(--muted);cursor:pointer;width:32px;height:32px;border-radius:8px;font-size:1.1rem;display:flex;align-items:center;justify-content:center;transition:all .2s;}
  .modal-close:hover{color:var(--text);border-color:var(--accent);}
  .modal-avatar{width:80px;height:80px;border-radius:50%;background:var(--bg4);margin:0 auto 10px;overflow:hidden;border:3px solid var(--border);}
  .modal-avatar img{width:100%;height:100%;object-fit:cover;}
  .modal-name{text-align:center;font-family:'Rajdhani',sans-serif;font-size:1.6rem;font-weight:700;}
  .modal-rank-badge{display:inline-flex;align-items:center;gap:6px;background:var(--bg4);border:1px solid var(--border);border-radius:20px;padding:5px 14px;font-size:.82rem;color:var(--muted);}
  .modal-section-label{font-size:.75rem;font-weight:700;letter-spacing:.1em;color:var(--muted);text-transform:uppercase;margin:14px 0 8px;}
  .modal-position{background:var(--bg3);border-radius:10px;padding:12px 16px;display:flex;align-items:center;gap:12px;}
  .modal-pos-num{font-family:'Rajdhani',sans-serif;font-size:1.8rem;font-weight:700;color:var(--gold);}
  .modal-tiers-grid{display:flex;flex-wrap:wrap;gap:7px;background:var(--bg3);border-radius:10px;padding:12px;max-height:200px;overflow-y:auto;}
  .modal-tbadge{display:flex;flex-direction:column;align-items:center;gap:2px;min-width:42px;}
  .modal-tbadge .ico{font-size:1.2rem;}
  .modal-tbadge .lbl{font-size:.6rem;font-weight:700;padding:2px 5px;border-radius:4px;}
  .modal-tbadge .lbl.ht{background:rgba(245,200,66,.2);color:var(--gold);}
  .modal-tbadge .lbl.lt{background:var(--bg4);color:var(--muted);}
  .modal-tbadge .lbl.none{color:var(--border);}
  .namemc-link{display:flex;align-items:center;justify-content:center;gap:6px;margin-top:12px;color:var(--muted);font-size:.82rem;text-decoration:none;transition:color .2s;padding:8px;border-radius:8px;border:1px solid var(--border);}
  .namemc-link:hover{color:var(--accent);border-color:var(--accent);}
  /* ADMIN */
  .admin-panel{display:none;position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:2000;align-items:center;justify-content:center;backdrop-filter:blur(6px);}
  .admin-panel.show{display:flex;}
  .admin-box{background:var(--bg2);border:1px solid var(--border);border-radius:16px;width:760px;max-width:95vw;max-height:88vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 32px 80px rgba(0,0,0,.7);animation:popIn .25s cubic-bezier(.34,1.56,.64,1);}
  .admin-header{padding:18px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
  .admin-title{font-family:'Rajdhani',sans-serif;font-size:1.3rem;font-weight:700;color:var(--gold);}
  .admin-body{padding:20px 24px;overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:14px;}
  .admin-row{display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap;}
  .admin-field{display:flex;flex-direction:column;gap:5px;flex:1;min-width:110px;}
  .admin-field label{font-size:.75rem;color:var(--muted);font-weight:500;text-transform:uppercase;letter-spacing:.05em;}
  .admin-input,.admin-select{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--text);font-family:'Inter',sans-serif;font-size:.85rem;outline:none;transition:border .2s;width:100%;}
  .admin-input:focus,.admin-select:focus{border-color:var(--accent);}
  .admin-select option{background:var(--bg3);}
  .btn{padding:9px 18px;border-radius:8px;font-family:'Inter',sans-serif;font-size:.85rem;font-weight:600;cursor:pointer;border:none;transition:all .2s;white-space:nowrap;}
  .btn-green{background:var(--green);color:#fff;}
  .btn-green:hover{filter:brightness(1.15);}
  .btn-red{background:var(--red);color:#fff;}
  .btn-red:hover{filter:brightness(1.15);}
  .btn-gold{background:var(--gold);color:#000;}
  .btn-gold:hover{filter:brightness(1.1);}
  .btn-gray{background:var(--bg4);color:var(--muted);border:1px solid var(--border);}
  .btn-gray:hover{color:var(--text);border-color:var(--muted);}
  .admin-divider{border-top:1px solid var(--border);margin:2px 0;}
  .admin-players-list{max-height:260px;overflow-y:auto;display:flex;flex-direction:column;gap:4px;}
  .admin-player-row{display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--bg3);border-radius:8px;border:1px solid var(--border);}
  .admin-player-row .apn{flex:1;font-size:.85rem;font-weight:500;}
  .admin-player-row .apm{font-size:.75rem;color:var(--muted);}
  .rm-btn{background:rgba(224,82,82,.15);border:1px solid rgba(224,82,82,.35);color:var(--red);border-radius:6px;padding:3px 9px;font-size:.75rem;cursor:pointer;font-family:'Inter',sans-serif;transition:all .2s;white-space:nowrap;}
  .rm-btn:hover{background:var(--red);color:#fff;}
  /* TOAST */
  .admin-toast{position:fixed;bottom:20px;right:20px;background:var(--green);color:#fff;padding:10px 18px;border-radius:10px;font-size:.85rem;font-weight:600;z-index:9999;opacity:0;transform:translateY(10px);transition:all .3s;pointer-events:none;}
  .admin-toast.show{opacity:1;transform:translateY(0);}
  .admin-toast.err{background:var(--red);}
  /* TOP BAR */
  .top-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;gap:12px;flex-wrap:wrap;}
  .info-badge{display:flex;align-items:center;gap:6px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:6px 14px;font-size:.8rem;color:var(--muted);cursor:pointer;transition:all .2s;}
  .info-badge:hover{border-color:var(--accent);color:var(--text);}
  .server-ip{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:6px 14px;display:flex;align-items:center;gap:8px;font-size:.8rem;}
  .admin-key-btn{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:6px 14px;color:var(--muted);cursor:pointer;font-size:.8rem;font-family:'Inter',sans-serif;transition:all .2s;}
  .admin-key-btn:hover{border-color:var(--gold);color:var(--gold);}
  /* KEY MODAL */
  .key-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:3000;align-items:center;justify-content:center;backdrop-filter:blur(4px);}
  .key-modal.show{display:flex;}
  .key-box{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:28px;min-width:320px;animation:popIn .2s cubic-bezier(.34,1.56,.64,1);}
  .key-title{font-family:'Rajdhani',sans-serif;font-size:1.3rem;font-weight:700;margin-bottom:14px;}
  /* LOADING */
  .loading{display:flex;align-items:center;justify-content:center;padding:60px;gap:12px;color:var(--muted);}
  .spinner{width:24px;height:24px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg)}}
  /* DB STATUS */
  .db-status{display:inline-flex;align-items:center;gap:5px;font-size:.75rem;color:var(--muted);}
  .db-dot{width:7px;height:7px;border-radius:50%;background:var(--green);}
  .db-dot.err{background:var(--red);}
  /* SEARCH HIGHLIGHT */
  .search-real-rank{display:inline-flex;align-items:center;gap:4px;background:rgba(245,166,35,.15);border:1px solid rgba(245,166,35,.4);border-radius:6px;padding:2px 8px;font-size:.72rem;color:var(--gold);font-weight:700;margin-left:8px;}
  ::-webkit-scrollbar{width:6px;height:6px;}
  ::-webkit-scrollbar-track{background:var(--bg2);}
  ::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
  ::-webkit-scrollbar-thumb:hover{background:var(--muted);}
  @media(max-width:1000px){.tier-grid{grid-template-columns:repeat(3,1fr);}}
  @media(max-width:700px){.tier-grid{grid-template-columns:repeat(2,1fr);}.tier-badges{display:none;}}
  @media(max-width:480px){.tier-grid{grid-template-columns:1fr;}.modal{min-width:96vw;padding:18px;}}
</style>
</head>
<body>

<nav>
  <div class="logo">NET<span>TIERS</span></div>
  <div class="nav-links">
    <button class="nav-btn">🏠 Home</button>
    <button class="nav-btn active">🏆 Rankings</button>
    <a href="https://discord.gg/TDSvexxwKV" target="_blank" rel="noopener" class="nav-btn discord-btn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057c.001.022.01.043.024.056a19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/></svg>
      Discord
    </a>
    <button class="nav-btn">📄 API Docs</button>
  </div>
  <input class="nav-search" placeholder="🔍 Search player..." id="globalSearch" oninput="handleGlobalSearch(this.value)">
</nav>

<div class="tabs-wrap">
  <div class="tabs">
    <button class="tab active" onclick="switchTab('overall',this)"><span class="icon">🏆</span>Overall</button>
    <button class="tab" onclick="switchTab('vanilla',this)"><span class="icon">🎯</span>Vanilla</button>
    <button class="tab" onclick="switchTab('uhc',this)"><span class="icon">❤️</span>UHC</button>
    <button class="tab" onclick="switchTab('pot',this)"><span class="icon">🧪</span>Pot</button>
    <button class="tab" onclick="switchTab('nethop',this)"><span class="icon">👾</span>NethOP</button>
    <button class="tab" onclick="switchTab('smp',this)"><span class="icon">🌀</span>SMP</button>
    <button class="tab" onclick="switchTab('sword',this)"><span class="icon">⚔️</span>Sword</button>
    <button class="tab" onclick="switchTab('axe',this)"><span class="icon">🪓</span>Axe</button>
    <button class="tab" onclick="switchTab('mace',this)"><span class="icon">🔨</span>Mace</button>
    <button class="tab" onclick="switchTab('cart',this)"><span class="icon">🛒</span>Cart</button>
    <button class="tab" onclick="switchTab('spearmace',this)"><span class="icon">🏹</span>Spear Mace</button>
    <button class="tab" onclick="switchTab('nethsmp',this)"><span class="icon">🌐</span>Neth SMP</button>
    <button class="tab" onclick="switchTab('ironsmp',this)"><span class="icon">🛡️</span>Iron SMP</button>
    <button class="tab" onclick="switchTab('spearmaceop',this)"><span class="icon">⚡</span>Spear Mace OP</button>
    <button class="tab" onclick="switchTab('bow',this)"><span class="icon">🏹</span>Bow</button>
    <button class="tab" onclick="switchTab('opkit',this)"><span class="icon">💥</span>Op Kit</button>
  </div>
</div>

<div class="content">
  <div class="top-bar">
    <div style="display:flex;gap:8px;align-items:center;">
      <div class="info-badge">ℹ️ Information</div>
      <button class="admin-key-btn" onclick="openKeyModal()">🔑 Admin</button>
    </div>
    <div class="server-ip">
      <span>🖥️</span>
      <span style="color:var(--muted)">SERVER IP</span>
      <span style="font-weight:600;color:var(--accent)">⏳ Coming Soon</span>
    </div>
  </div>
  <div id="mainContent"><div class="loading"><div class="spinner"></div>&nbsp;Connecting to database...</div></div>
</div>

<!-- PROFILE MODAL -->
<div class="modal-overlay" id="profileModal" onclick="closeProfileIfOutside(event)">
  <div class="modal">
    <button class="modal-close" onclick="closeProfile()">✕</button>
    <div class="modal-avatar"><img id="pAvatarImg" src="" alt="" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 80 80%22><rect width=%2280%22 height=%2280%22 fill=%22%23222736%22/><text x=%2240%22 y=%2250%22 text-anchor=%22middle%22 font-size=%2232%22>🎮</text></svg>'"></div>
    <div class="modal-name" id="pName"></div>
    <div style="text-align:center;margin:6px 0"><div class="modal-rank-badge"><span>💎</span><span id="pTitle"></span></div></div>
    <div style="text-align:center;color:var(--muted);font-size:.85rem;margin-bottom:14px" id="pRegion"></div>
    <div class="modal-section-label">POSITION</div>
    <div class="modal-position">
      <div class="modal-pos-num" id="pPos"></div>
      <div>
        <div style="font-size:.85rem;font-weight:600;">🏆 OVERALL</div>
        <div style="font-size:.78rem;color:var(--muted)" id="pPts"></div>
      </div>
    </div>
    <div class="modal-section-label">TIERS</div>
    <div class="modal-tiers-grid" id="pTiers"></div>
    <a id="pNameMC" href="#" target="_blank" rel="noopener" class="namemc-link">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M19 19H5V5h7V3H5a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7h-2v7zM14 3v2h3.59L7.76 14.83l1.41 1.41L19 5.41V9h2V3h-7z"/></svg>
      View on NameMC
    </a>
  </div>
</div>

<!-- ADMIN KEY MODAL -->
<div class="key-modal" id="keyModal" onclick="closeKeyIfOutside(event)">
  <div class="key-box">
    <div class="key-title">🔑 Admin Access</div>
    <div class="admin-field" style="margin-bottom:12px;">

<script>
// ── CONFIG ──
const SB_URL = 'https://rljvcykuiswwriwapsgi.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJsanZjeWt1aXN3d3Jpd2Fwc2dpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5NzE1NTUsImV4cCI6MjA4OTU0NzU1NX0.TL2BzGqeb8GsWEsaCTwtzqKaKqB9l8ROdVap7rOPDZI';
const ADMIN_PASS = 'KabulKarwan@2013';

const TIER_PTS = {LT5:1,HT5:2,LT4:3,HT4:4,LT3:5,HT3:10,LT2:20,HT2:40,LT1:50,HT1:60};
const GM_ICONS = {
  vanilla:'🎯',uhc:'❤️',pot:'🧪',nethop:'👾',smp:'🌀',sword:'⚔️',
  axe:'🪓',mace:'🔨',cart:'🛒',spearmace:'🏹',
  nethsmp:'🌐',ironsmp:'🛡️',spearmaceop:'⚡',bow:'🎯',opkit:'💥'
};
const GM_NAMES = {
  vanilla:'Vanilla',uhc:'UHC',pot:'Pot',nethop:'NethOP',smp:'SMP',sword:'Sword',
  axe:'Axe',mace:'Mace',cart:'Cart',spearmace:'Spear Mace',
  nethsmp:'Neth SMP',ironsmp:'Iron SMP',spearmaceop:'Spear Mace OP',bow:'Bow',opkit:'Op Kit'
};
const GM_ORDER = ['vanilla','uhc','pot','nethop','smp','sword','axe','mace','cart','spearmace','nethsmp','ironsmp','spearmaceop','bow','opkit'];

// ── SUPABASE REST ──
let dbOk = false;
// Use plain objects instead of Headers() so this works everywhere (including sandboxed iframes)
function sbHeaders(prefer){
  const h = {
    'apikey': SB_KEY,
    'Authorization': 'Bearer ' + SB_KEY,
    'Content-Type': 'application/json'
  };
  if(prefer) h['Prefer'] = prefer;
  return h;
}
async function sbSelect(table){
  const r = await fetch(SB_URL+'/rest/v1/'+table+'?select=*&order=id.asc&limit=100000', {
    method:'GET', headers: sbHeaders()
  });
  if(!r.ok){ const t=await r.text(); throw new Error(t); }
  return r.json();
}
async function sbInsert(table, rows){
  const r = await fetch(SB_URL+'/rest/v1/'+table, {
    method:'POST',
    headers: sbHeaders('return=representation'),
    body: JSON.stringify(rows)
  });
  if(!r.ok){ const t=await r.text(); throw new Error(t); }
  return r.json();
}
async function sbDeleteById(table, id){
  const r = await fetch(SB_URL+'/rest/v1/'+table+'?id=eq.'+id, {
    method:'DELETE', headers: sbHeaders()
  });
  if(!r.ok){ const t=await r.text(); throw new Error(t); }
}
async function sbDeleteByNameGm(table, name, gm){
  const url = SB_URL+'/rest/v1/'+table+'?name=eq.'+encodeURIComponent(name)+'&gamemode=eq.'+encodeURIComponent(gm);
  const r = await fetch(url, {method:'DELETE', headers: sbHeaders()});
  if(!r.ok){ const t=await r.text(); throw new Error(t); }
}

// ── STATE ──
let DATA = {};
let allPlayers = [];
let currentTab = 'overall';
// Pre-compute sorted overall ranking so it's always consistent
let cachedRanking = [];

// ── SKIN URLS ──
const skinUrl  = n => `https://mc-heads.net/avatar/${encodeURIComponent(n)}/64`;
const skinSm   = n => `https://mc-heads.net/avatar/${encodeURIComponent(n)}/32`;
const nameMCUrl= n => `https://namemc.com/profile/${encodeURIComponent(n)}`;
function imgErr(el){ el.style.display='none'; }

// ── TITLE ──
function getTitle(pts){
  if(pts>=400)return'Combat Grandmaster';
  if(pts>=250)return'Combat Master';
  if(pts>=100)return'Combat Ace';
  if(pts>=50) return'Combat Specialist';
  if(pts>=20) return'Combat Cadet';
  if(pts>=10) return'Combat Novice';
  return'Rookie';
}

// ── COMPUTE POINTS ──
function computePlayer(name){
  let total=0,tiers={};
  for(const[gm,td]of Object.entries(DATA)){
    for(const[tk,players]of Object.entries(td)){
      const n=tk.replace('t','');
      const p=players.find(p=>p.name.toLowerCase()===name.toLowerCase());
      if(p){const k=(p.ht?'HT':'LT')+n;total+=TIER_PTS[k]||0;tiers[gm]={tier:n,ht:p.ht,key:k};}
    }
  }
  return{total,tiers};
}

// ── BUILD DATA FROM FLAT LIST ──
function rebuildDATA(){
  DATA={};
  GM_ORDER.forEach(gm=>{DATA[gm]={t1:[],t2:[],t3:[],t4:[],t5:[]};});
  allPlayers.forEach(p=>{
    const gm=p.gamemode,tk='t'+p.tier;
    if(DATA[gm]&&DATA[gm][tk]!==undefined)
      DATA[gm][tk].push({name:p.name,ht:!!p.ht,region:p.region||'NA',db_id:p.id});
  });
  // Rebuild global ranking cache whenever data changes
  rebuildRankingCache();
}

// ── RANKING CACHE (always reflects true global rank) ──
function rebuildRankingCache(){
  const names=new Set();
  for(const td of Object.values(DATA))for(const pl of Object.values(td))pl.forEach(p=>names.add(p.name));
  cachedRanking=[...names].map(n=>{
    const{total,tiers}=computePlayer(n);
    const region=getRegion(n);
    return{name:n,total,tiers,region};
  }).sort((a,b)=>b.total-a.total);
}

function getRegion(name){
  for(const td of Object.values(DATA))for(const pl of Object.values(td)){
    const p=pl.find(x=>x.name===name);if(p)return p.region||'NA';
  }
  return'NA';
}

function getRealRank(name){
  const idx=cachedRanking.findIndex(p=>p.name.toLowerCase()===name.toLowerCase());
  return idx===-1?null:idx+1;
}

// ── SUPABASE LOAD ──
async function initDB(){
  document.getElementById('mainContent').innerHTML='<div class="loading"><div class="spinner"></div>&nbsp;Connecting to database...</div>';
  try{
    const data = await sbSelect('players');
    dbOk=true; setDBStatus(true);
    if(data && data.length > 0){
      allPlayers = data;
      console.log('Loaded', data.length, 'players from Supabase');
      rebuildDATA(); renderContent();
    } else {
      console.log('Table empty, seeding initial data...');
      await seedToDB();
    }
  }catch(e){
    console.error('Supabase error:', e.message);
    setDBStatus(false);
    allPlayers = getSeed();
    rebuildDATA(); renderContent();
  }
}

async function seedToDB(){
  const seed = getSeed();
  try{
    let allInserted = [];
    for(let i=0; i<seed.length; i+=50){
      const batch = seed.slice(i, i+50);
      const inserted = await sbInsert('players', batch);
      allInserted = allInserted.concat(inserted||batch);
    }
    allPlayers = allInserted.length ? allInserted : seed;
    console.log('Seeded', allPlayers.length, 'players to Supabase');
  }catch(e){
    console.error('Seed error:', e.message);
    allPlayers = seed;
  }
  rebuildDATA(); renderContent();
}

function setDBStatus(ok){
  dbOk=ok;
  const dot=document.getElementById('dbDot');
  const lbl=document.getElementById('dbStatus');
  if(dot){dot.className='db-dot'+(ok?'':' err');}
  if(lbl){lbl.textContent=ok?'Supabase Connected':'Local (DB offline)';}
}

// ── RENDER ──
function switchTab(tab,el){
  currentTab=tab;
  // Clear search when switching tabs
  document.getElementById('globalSearch').value='';
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  renderContent();
}

function renderContent(){
  document.getElementById('mainContent').innerHTML=
    currentTab==='overall'?buildOverall():buildTierView(currentTab);
}

function buildOverall(){
  let html='<div class="overall-list">';
  cachedRanking.slice(0,100000).forEach((p,i)=>{
    const rc=i===0?'r1':i===1?'r2':i===2?'r3':'';
    const badges=GM_ORDER.map(gm=>{
      if(!p.tiers[gm])return`<div class="tbadge lt" title="${GM_NAMES[gm]}"><span class="badge-icon">${GM_ICONS[gm]}</span><span class="badge-label">-</span></div>`;
      const t=p.tiers[gm],cls=t.ht?'ht':'lt',lbl=(t.ht?'HT':'LT')+t.tier;
      return`<div class="tbadge ${cls}" title="${GM_NAMES[gm]} ${lbl}"><span class="badge-icon">${GM_ICONS[gm]}</span><span class="badge-label">${lbl}</span></div>`;
    }).join('');
    html+=`<div class="overall-row" onclick="openProfile(${JSON.stringify(p.name)})">
      <div class="rank-num ${rc}">${i+1}.</div>
      <div class="player-avatar"><img src="${skinUrl(p.name)}" alt="${p.name}" onerror="imgErr(this)"></div>
      <div class="player-info">
        <div class="player-name">${p.name}</div>
        <div class="player-title">💎 ${getTitle(p.total)} (${p.total} points)</div>
      </div>
      <div class="region-tag ${p.region}">${p.region}</div>
      <div class="tier-badges">${badges}</div>
    </div>`;
  });
  return html+'</div>';
}

function buildTierView(gm){
  const td=DATA[gm];
  if(!td)return'<p style="color:var(--muted)">No data.</p>';
  const cols=[{k:'t1',l:'Tier 1',c:'t1',i:'🏆'},{k:'t2',l:'Tier 2',c:'t2',i:'🥈'},{k:'t3',l:'Tier 3',c:'t3',i:'🥉'},{k:'t4',l:'Tier 4',c:'t4',i:''},{k:'t5',l:'Tier 5',c:'t5',i:''}];
  let html='<div class="tier-grid">';
  cols.forEach(({k,l,c,i})=>{
    const pls=td[k]||[];
    html+=`<div><div class="tier-header ${c}">${i} ${l}</div>`;
    pls.forEach(p=>{
      const hc=p.ht?'ht-player':'',bc=p.ht?'ht':'lt',bl=p.ht?'HT':'LT',n=k.replace('t','');
      html+=`<div class="tier-player ${hc}" onclick="openProfile(${JSON.stringify(p.name)})">
        <div class="region-dot ${p.region}"></div>
        <div class="tp-avatar"><img src="${skinSm(p.name)}" alt="${p.name}" onerror="imgErr(this)"></div>
        <div class="tp-name">${p.name}</div>
        <div class="tp-badge ${bc}">${bl}${n}</div>
      </div>`;
    });
    html+='</div>';
  });
  return html+'</div>';
}

// ── PROFILE ──
function openProfile(name){
  const{total,tiers}=computePlayer(name);
  const region=getRegion(name);
  // ALWAYS use real rank from the global cached ranking
  const rank=getRealRank(name)||'?';

  document.getElementById('pAvatarImg').src=skinUrl(name);
  document.getElementById('pName').textContent=name;
  document.getElementById('pTitle').textContent=getTitle(total);
  document.getElementById('pRegion').textContent='📍 '+region;
  document.getElementById('pPos').textContent=rank+'.';
  document.getElementById('pPts').textContent=total+' points';
  document.getElementById('pNameMC').href=nameMCUrl(name);

  let th='';
  GM_ORDER.forEach(gm=>{
    const t=tiers[gm];
    if(t){const lbl=(t.ht?'HT':'LT')+t.tier,cls=t.ht?'ht':'lt';
      th+=`<div class="modal-tbadge"><div class="ico">${GM_ICONS[gm]}</div><div class="lbl ${cls}">${lbl}</div><div style="font-size:.55rem;color:var(--muted)">${GM_NAMES[gm]}</div></div>`;}
    else th+=`<div class="modal-tbadge"><div class="ico">${GM_ICONS[gm]}</div><div class="lbl none">-</div><div style="font-size:.55rem;color:var(--border)">${GM_NAMES[gm]}</div></div>`;
  });
  document.getElementById('pTiers').innerHTML=th;
  document.getElementById('profileModal').classList.add('show');
}
function closeProfile(){document.getElementById('profileModal').classList.remove('show');}
function closeProfileIfOutside(e){if(e.target.id==='profileModal')closeProfile();}

// ── ADMIN ──
function openKeyModal(){document.getElementById('keyInput').value='';document.getElementById('keyErr').style.display='none';document.getElementById('keyModal').classList.add('show');setTimeout(()=>document.getElementById('keyInput').focus(),80);}
function closeKeyModal(){document.getElementById('keyModal').classList.remove('show');}
function closeKeyIfOutside(e){if(e.target.id==='keyModal')closeKeyModal();}
function checkKey(){
  if(document.getElementById('keyInput').value===ADMIN_PASS){closeKeyModal();openAdmin();}
  else document.getElementById('keyErr').style.display='block';
}
function openAdmin(){setDBStatus(dbOk);document.getElementById('adminPanel').classList.add('show');renderAdminPreview();}
function closeAdmin(){document.getElementById('adminPanel').classList.remove('show');}
function closeAdminIfOutside(e){if(e.target.id==='adminPanel')closeAdmin();}

async function adminAddPlayer(){
  const name=document.getElementById('addName').value.trim();
  const gm=document.getElementById('addMode').value;
  const tier=parseInt(document.getElementById('addTier').value);
  const ht=document.getElementById('addHT').value==='HT';
  const region=document.getElementById('addRegion').value;
  if(!name){showToast('Enter a player name!',true);return;}
  const tk='t'+tier;
  if(DATA[gm][tk].find(p=>p.name.toLowerCase()===name.toLowerCase())){showToast('Already in this tier!',true);return;}
  const row={name,gamemode:gm,tier,ht,region};
  
  if(dbOk){
    // Always try to save to DB first
    try{
      const data = await sbInsert('players', [row]);
      allPlayers.push(data[0]);
      rebuildDATA();
      showToast('✅ Saved to DB: '+name+' → '+GM_NAMES[gm]+' T'+tier+(ht?'HT':'LT'));
    }catch(e){
      console.error('Insert error:', e.message);
      // Still add locally so user sees it this session
      allPlayers.push({...row, id:'local_'+Date.now()});
      rebuildDATA();
      showToast('⚠️ DB error, added locally only', true);
    }
  } else {
    allPlayers.push({...row, id:'local_'+Date.now()});
    rebuildDATA();
    showToast('⚠️ Added locally (DB offline)', false);
  }
  document.getElementById('addName').value='';
  renderAdminPreview();renderContent();
}

async function adminRemoveByName(){
  const name=document.getElementById('removeName').value.trim();
  const mode=document.getElementById('removeMode').value;
  if(!name){showToast('Enter a player name!',true);return;}
  const gms=mode==='ALL'?GM_ORDER:[mode];
  let removed=0;
  for(const gm of gms){
    const toRemove=allPlayers.filter(p=>p.name.toLowerCase()===name.toLowerCase()&&p.gamemode===gm);
    if(!toRemove.length)continue;
    for(const p of toRemove){
      try{
        if(p.id&&dbOk&&!String(p.id).startsWith('local_')) await sbDeleteById('players', p.id);
      }catch(e){}
      allPlayers=allPlayers.filter(x=>x!==p);removed++;
    }
  }
  if(removed){rebuildDATA();showToast(`🗑️ Removed ${name}`);document.getElementById('removeName').value='';renderAdminPreview();renderContent();}
  else showToast(`"${name}" not found!`,true);
}

async function removeRowInline(dbId,name,gm){
  try{
    if(dbId&&dbOk&&!String(dbId).startsWith('local_')) await sbDeleteById('players', dbId);
    else if(dbOk) await sbDeleteByNameGm('players', name, gm);
  }catch(e){}
  allPlayers=allPlayers.filter(p=>!(p.id===dbId||(p.name===name&&p.gamemode===gm)));
  rebuildDATA();showToast(`🗑️ Removed ${name}`);renderAdminPreview();renderContent();
}

function renderAdminPreview(){
  const gm=document.getElementById('previewMode').value;
  const list=document.getElementById('adminPreviewList');
  let html='';
  for(const[tk,players]of Object.entries(DATA[gm]||{})){
    const n=tk.replace('t','');
    players.forEach(p=>{
      const lbl=(p.ht?'HT':'LT')+n;
      html+=`<div class="admin-player-row">
        <img src="${skinSm(p.name)}" width="24" height="24" style="border-radius:4px" onerror="this.style.display='none'">
        <span class="apn">${p.name}</span>
        <span class="apm">${lbl} · ${p.region}</span>
        <button class="rm-btn" onclick="removeRowInline(${JSON.stringify(p.db_id)},${JSON.stringify(p.name)},${JSON.stringify(gm)})">🗑️ Remove</button>
      </div>`;
    });
  }
  list.innerHTML=html||'<div style="color:var(--muted);font-size:.85rem;padding:10px 0;">No players in this gamemode.</div>';
}

// ── SEARCH — shows real global rank ──
function handleGlobalSearch(val){
  if(!val.trim()){renderContent();return;}
  const q=val.toLowerCase();
  // Filter from cached ranking so order and rank numbers are TRUE global ranks
  const matches=cachedRanking.filter(p=>p.name.toLowerCase().includes(q));
  if(!matches.length){
    document.getElementById('mainContent').innerHTML='<p style="color:var(--muted);padding:20px 0;">No players found.</p>';
    return;
  }
  let html='<div class="overall-list">';
  matches.forEach((p)=>{
    // realRank is index in the global sorted array
    const realRank=getRealRank(p.name);
    const rc=realRank===1?'r1':realRank===2?'r2':realRank===3?'r3':'';
    const badges=GM_ORDER.map(gm=>{
      if(!p.tiers[gm])return`<div class="tbadge lt" title="${GM_NAMES[gm]}"><span class="badge-icon">${GM_ICONS[gm]}</span><span class="badge-label">-</span></div>`;
      const t=p.tiers[gm],cls=t.ht?'ht':'lt',lbl=(t.ht?'HT':'LT')+t.tier;
      return`<div class="tbadge ${cls}" title="${GM_NAMES[gm]} ${lbl}"><span class="badge-icon">${GM_ICONS[gm]}</span><span class="badge-label">${lbl}</span></div>`;
    }).join('');
    html+=`<div class="overall-row" onclick="openProfile(${JSON.stringify(p.name)})">
      <div class="rank-num ${rc}">${realRank}.</div>
      <div class="player-avatar"><img src="${skinUrl(p.name)}" alt="${p.name}" onerror="imgErr(this)"></div>
      <div class="player-info">
        <div class="player-name">${p.name}<span class="search-real-rank">🏆 Global #${realRank}</span></div>
        <div class="player-title">💎 ${getTitle(p.total)} (${p.total} pts)</div>
      </div>
      <div class="region-tag ${p.region}">${p.region}</div>

}
