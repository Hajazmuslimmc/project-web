<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Networkak Tiers</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Exo+2:wght@300;400;600;800&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0a0c10;--surface:#111318;--surface2:#181c24;--border:#1e2330;--accent:#00e5ff;--accent2:#ff6b35;--gold:#ffd700;--silver:#c0c0c0;--bronze:#cd7f32;--green:#00ff88;--red:#ff4757;--text:#e8eaf0;--muted:#6b7280;--ht:#ff6b35;--lt:#00aaff;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:'Exo 2',sans-serif;min-height:100vh;overflow-x:hidden;}
  body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,229,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,255,0.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0;}
  nav{position:sticky;top:0;z-index:100;background:rgba(10,12,16,0.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 2rem;display:flex;align-items:center;justify-content:space-between;height:64px;}
  .logo{font-family:'Rajdhani',sans-serif;font-size:1.6rem;font-weight:700;letter-spacing:2px;color:var(--accent);text-transform:uppercase;}
  .logo span{color:var(--accent2);}
  .nav-links{display:flex;gap:2rem;list-style:none;}
  .nav-links a{color:var(--muted);text-decoration:none;font-weight:600;font-size:0.85rem;letter-spacing:1px;text-transform:uppercase;transition:color 0.2s;}
  .nav-links a:hover,.nav-links a.active{color:var(--accent);}
  .search-bar{display:flex;align-items:center;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:0.4rem 1rem;gap:0.5rem;width:220px;}
  .search-bar input{background:none;border:none;outline:none;color:var(--text);font-family:'Exo 2',sans-serif;font-size:0.85rem;width:100%;}
  .search-bar input::placeholder{color:var(--muted);}
  .hero{position:relative;z-index:1;padding:3rem 2rem 2rem;text-align:center;}
  .hero h1{font-family:'Rajdhani',sans-serif;font-size:clamp(2.5rem,6vw,5rem);font-weight:700;letter-spacing:4px;text-transform:uppercase;line-height:1;margin-bottom:0.5rem;}
  .hero h1 .glow{color:var(--accent);text-shadow:0 0 40px rgba(0,229,255,0.5);}
  .hero p{color:var(--muted);font-size:0.9rem;letter-spacing:2px;text-transform:uppercase;}
  .tabs-wrapper{position:relative;z-index:1;padding:0 2rem;margin-bottom:1.5rem;overflow-x:auto;scrollbar-width:none;}
  .tabs{display:flex;gap:0.5rem;border-bottom:1px solid var(--border);min-width:max-content;}
  .tab{padding:0.7rem 1.2rem;background:none;border:none;color:var(--muted);font-family:'Exo 2',sans-serif;font-weight:600;font-size:0.8rem;letter-spacing:1px;text-transform:uppercase;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all 0.2s;display:flex;align-items:center;gap:8px;}
  .tab:hover{color:var(--text);}
  .tab.active{color:var(--accent);border-bottom-color:var(--accent);}
  .tab-icon{width:20px;height:20px;object-fit:contain;filter:brightness(0.6) saturate(0.5);transition:filter 0.2s;}
  .tab.active .tab-icon,.tab:hover .tab-icon{filter:brightness(1.3) saturate(1.2);}
  .container{position:relative;z-index:1;max-width:1200px;margin:0 auto;padding:0 2rem 4rem;}
  .section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;}
  .section-title{font-family:'Rajdhani',sans-serif;font-size:1rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);}
  .live-badge{display:inline-flex;align-items:center;gap:6px;padding:3px 10px;background:rgba(255,71,87,0.15);border:1px solid rgba(255,71,87,0.4);border-radius:20px;font-size:0.7rem;font-weight:700;letter-spacing:1px;color:var(--red);text-transform:uppercase;}
  .live-dot{width:6px;height:6px;background:var(--red);border-radius:50%;animation:pulse 1.5s infinite;}
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}
  .tier-columns{display:grid;grid-template-columns:repeat(5,1fr);gap:0.6rem;margin-bottom:2rem;}
  .tier-col{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;min-width:0;}
  .tier-col-header{padding:0.75rem 1rem;text-align:left;font-family:'Rajdhani',sans-serif;font-size:1.1rem;font-weight:700;letter-spacing:1px;display:flex;align-items:center;gap:8px;border-bottom:1px solid rgba(255,255,255,0.07);}
  .tier-col-HT{background:linear-gradient(135deg,#5a4200,#3d2d00);color:#ffd700;border-bottom:2px solid rgba(255,180,0,0.4);}
  .tier-col-LT{background:var(--surface2);color:var(--text);border-bottom:1px solid var(--border);}
  .tier-col-body{padding:0.3rem 0;}
  .tier-player{display:flex;align-items:center;gap:8px;padding:0.42rem 0.8rem;cursor:pointer;transition:background 0.15s;position:relative;border-bottom:1px solid rgba(255,255,255,0.03);}
  .tier-player:last-child{border-bottom:none;}
  .tier-player:hover{background:rgba(255,255,255,0.05);}
  .tier-player-avatar{width:30px;height:30px;border-radius:5px;overflow:hidden;flex-shrink:0;image-rendering:pixelated;background:var(--surface2);}
  .tier-player-avatar img{width:100%;height:100%;object-fit:cover;image-rendering:pixelated;display:block;}
  .tier-player-name{font-size:0.84rem;font-weight:600;letter-spacing:0.2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0;}
  .tier-chevron{color:rgba(255,255,255,0.15);font-size:0.75rem;flex-shrink:0;}
  .tier-empty{color:var(--muted);font-size:0.75rem;text-align:center;padding:1rem 0.5rem;}
  .region-legend{display:flex;align-items:center;gap:1.2rem;flex-wrap:wrap;margin-bottom:1rem;}
  .legend-item{display:flex;align-items:center;gap:5px;font-size:0.72rem;color:var(--muted);}
  .legend-line{width:14px;height:3px;border-radius:2px;}
  .empty-state{text-align:center;padding:4rem 2rem;color:var(--muted);}
  .empty-state .icon{font-size:3rem;margin-bottom:1rem;}
  .empty-state h3{font-size:1.2rem;margin-bottom:0.5rem;color:var(--text);}
  .player-row{display:grid;grid-template-columns:60px 1fr 100px 120px 200px;align-items:center;padding:0.8rem 1.5rem;background:var(--surface);border:1px solid var(--border);border-radius:12px;margin-bottom:0.5rem;cursor:pointer;transition:all 0.2s;animation:slideIn 0.4s ease both;}
  .player-row:hover{border-color:var(--accent);background:var(--surface2);transform:translateX(4px);}
  .player-row.rank-1{border-left:3px solid var(--gold);}
  .player-row.rank-2{border-left:3px solid var(--silver);}
  .player-row.rank-3{border-left:3px solid var(--bronze);}
  @keyframes slideIn{from{opacity:0;transform:translateX(-20px)}to{opacity:1;transform:translateX(0)}}
  .rank-num{font-family:'Rajdhani',sans-serif;font-size:1.2rem;font-weight:700;color:var(--muted);}
  .rank-1 .rank-num{color:var(--gold);}
  .rank-2 .rank-num{color:var(--silver);}
  .rank-3 .rank-num{color:var(--bronze);}
  .player-info{display:flex;align-items:center;gap:12px;}
  .player-avatar{width:40px;height:40px;border-radius:8px;background:var(--surface2);border:1px solid var(--border);overflow:hidden;flex-shrink:0;image-rendering:pixelated;}
  .player-avatar img{width:100%;height:100%;object-fit:cover;image-rendering:pixelated;display:block;}
  .player-name{font-weight:700;font-size:0.95rem;letter-spacing:0.5px;}
  .player-title{font-size:0.7rem;color:var(--muted);margin-top:1px;}
  .region-badge{display:inline-flex;align-items:center;justify-content:center;padding:3px 10px;border-radius:6px;font-size:0.75rem;font-weight:700;letter-spacing:1px;}
  .region-NA{background:rgba(255,107,53,0.2);color:var(--accent2);border:1px solid rgba(255,107,53,0.4);}
  .region-EU{background:rgba(0,229,255,0.1);color:var(--accent);border:1px solid rgba(0,229,255,0.3);}
  .region-AS{background:rgba(255,71,87,0.15);color:var(--red);border:1px solid rgba(255,71,87,0.3);}
  .region-AU{background:rgba(0,255,136,0.1);color:var(--green);border:1px solid rgba(0,255,136,0.3);}
  .region-SA{background:rgba(255,215,0,0.1);color:var(--gold);border:1px solid rgba(255,215,0,0.3);}
  .tier-badges{display:flex;flex-wrap:wrap;gap:4px;}
  .tier-badge{padding:3px 8px;border-radius:5px;font-size:0.65rem;font-weight:700;letter-spacing:0.5px;}
  .tier-HT1,.tier-HT2,.tier-HT3,.tier-HT4,.tier-HT5{background:rgba(255,107,53,0.2);color:var(--ht);border:1px solid rgba(255,107,53,0.4);}
  .tier-LT1,.tier-LT2,.tier-LT3,.tier-LT4,.tier-LT5{background:rgba(0,170,255,0.15);color:var(--lt);border:1px solid rgba(0,170,255,0.3);}
  .tier-retired{background:rgba(107,114,128,0.2);color:var(--muted);border:1px solid rgba(107,114,128,0.4);}
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:1000;display:flex;align-items:center;justify-content:center;padding:2rem;opacity:0;pointer-events:none;transition:opacity 0.3s;}
  .modal-overlay.open{opacity:1;pointer-events:all;}
  .modal{background:var(--surface);border:1px solid var(--border);border-radius:20px;width:100%;max-width:480px;padding:2rem;position:relative;transform:scale(0.9);transition:transform 0.3s;}
  .modal-overlay.open .modal{transform:scale(1);}
  .modal-close{position:absolute;top:1rem;right:1rem;background:var(--surface2);border:1px solid var(--border);border-radius:50%;width:32px;height:32px;cursor:pointer;color:var(--text);font-size:1rem;display:flex;align-items:center;justify-content:center;transition:all 0.2s;}
  .modal-close:hover{background:var(--red);border-color:var(--red);}
  .modal-header{display:flex;flex-direction:column;align-items:center;gap:0.5rem;margin-bottom:1.5rem;}
  .modal-avatar{width:80px;height:80px;border-radius:16px;border:2px solid var(--accent);overflow:hidden;background:var(--surface2);image-rendering:pixelated;}
  .modal-avatar img{width:100%;height:100%;object-fit:cover;image-rendering:pixelated;}
  .modal-name{font-family:'Rajdhani',sans-serif;font-size:1.8rem;font-weight:700;letter-spacing:2px;display:flex;align-items:center;gap:10px;}
  .retired-badge{font-size:0.6rem;background:rgba(107,114,128,0.2);color:var(--muted);border:1px solid rgba(107,114,128,0.3);border-radius:4px;padding:2px 8px;letter-spacing:1px;font-family:'Exo 2',sans-serif;}
  .modal-title-badge{color:var(--gold);font-size:0.8rem;font-weight:600;letter-spacing:1px;text-transform:uppercase;padding:4px 12px;background:rgba(255,215,0,0.1);border:1px solid rgba(255,215,0,0.3);border-radius:20px;}
  .modal-section{margin-bottom:1.2rem;}
  .modal-section h3{font-size:0.7rem;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:0.8rem;font-weight:600;}
  .modal-stats{display:grid;grid-template-columns:1fr 1fr;gap:0.8rem;}
  .modal-stat{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:0.8rem 1rem;}
  .modal-stat label{display:block;font-size:0.65rem;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:4px;}
  .modal-stat strong{font-size:1.1rem;font-weight:700;}
  .gamemode-tiers{display:flex;flex-direction:column;gap:6px;}
  .gamemode-tier-row{display:flex;align-items:center;justify-content:space-between;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:7px 12px;}
  .gamemode-label{display:flex;align-items:center;gap:8px;font-size:0.82rem;font-weight:600;color:var(--text);}
  .gamemode-label img{width:18px;height:18px;object-fit:contain;image-rendering:pixelated;}
  @media(max-width:900px){.tier-columns{grid-template-columns:repeat(3,1fr);}}
  @media(max-width:600px){.tier-columns{grid-template-columns:repeat(2,1fr);}.search-bar{display:none;}.player-row{grid-template-columns:50px 1fr 80px;}}
</style>
</head>
<body>
<nav>
  <div class="logo">Networkak <span>Tiers</span></div>
  <ul class="nav-links">
    <li><a href="#" class="active">Rankings</a></li>
    <li><a href="https://discord.gg/TDSvexxwKV" target="_blank">Discords</a></li>
    <li><a href="https://discord.gg/c8VG4NcFHG" target="_blank">API Docs</a></li>
  </ul>
  <div class="search-bar">
    <span>🔍</span>
    <input type="text" placeholder="Search your IGN to check your tier..." id="searchInput" oninput="filterPlayers()">
  </div>
</nav>
<div class="hero">
  <h1>Networkak <span class="glow">Tiers</span></h1>
  <p>Minecraft PVP Rankings — Live & Updated</p>
</div>
<div class="tabs-wrapper">
  <div class="tabs">
    <button class="tab active" onclick="switchTab('Overall',this)">🏆 Overall</button>
    <button class="tab" onclick="switchTab('SMP',this)"><img class="tab-icon" src="smp.png" alt="SMP"> SMP</button>
    <button class="tab" onclick="switchTab('Pot',this)"><img class="tab-icon" src="pot.png" alt="Pot"> Pot</button>
    <button class="tab" onclick="switchTab('UHC',this)"><img class="tab-icon" src="uhc.webp" alt="UHC"> UHC</button>
    <button class="tab" onclick="switchTab('Vanilla',this)"><img class="tab-icon" src="vanilla.png" alt="Vanilla"> Vanilla</button>
    <button class="tab" onclick="switchTab('Sword',this)"><img class="tab-icon" src="sword.png" alt="Sword"> Sword</button>
    <button class="tab" onclick="switchTab('Axe',this)"><img class="tab-icon" src="axe.png" alt="Axe"> Axe</button>
    <button class="tab" onclick="switchTab('Mace',this)"><img class="tab-icon" src="mace.png" alt="Mace"> Mace</button>
    <button class="tab" onclick="switchTab('NethOP',this)"><img class="tab-icon" src="nethop.png" alt="NethOP"> NethOP</button>
    <button class="tab" onclick="switchTab('Spear Mace',this)"><img class="tab-icon" src="spearmace.png" alt="Spear Mace"> Spear Mace</button>
  </div>
</div>
<div class="container">
  <div class="section-header">
    <span class="section-title" id="currentTabLabel">Overall Rankings</span>
    <span class="live-badge"><span class="live-dot"></span> Live</span>
  </div>
  <div class="region-legend">
    <span style="font-size:0.7rem;color:var(--muted);letter-spacing:1px;text-transform:uppercase;font-weight:600;">Region:</span>
    <div class="legend-item"><div class="legend-line" style="background:#ff6b35"></div> NA</div>
    <div class="legend-item"><div class="legend-line" style="background:#00ff88"></div> EU</div>
    <div class="legend-item"><div class="legend-line" style="background:#ff4757"></div> AS</div>
    <div class="legend-item"><div class="legend-line" style="background:#ffd700"></div> AU</div>
    <div class="legend-item"><div class="legend-line" style="background:#b06cff"></div> SA</div>
  </div>
  <div id="leaderboard"><div class="empty-state"><div class="icon">🏆</div><h3>Loading...</h3></div></div>
</div>
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal">
    <button class="modal-close" onclick="closeModalBtn()">✕</button>
    <div class="modal-header">
      <div class="modal-avatar"><img id="modalAvatar" src="" alt=""></div>
      <div class="modal-name" id="modalName"></div>
      <div class="modal-title-badge" id="modalTitleBadge"></div>
    </div>
    <div class="modal-section">
      <h3>Stats</h3>
      <div class="modal-stats">
        <div class="modal-stat"><label>Region</label><strong id="modalRegion">—</strong></div>
        <div class="modal-stat"><label>Points</label><strong id="modalPoints">0</strong></div>
      </div>
    </div>
    <div class="modal-section">
      <h3>Tiers by Gamemode</h3>
      <div class="gamemode-tiers" id="modalGamemodeTiers"></div>
    </div>
  </div>
</div>
<script>
const SB_URL='https://rljvcykuiswwriwapsgi.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJsanZjeWt1aXN3d3Jpd2Fwc2dpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5NzE1NTUsImV4cCI6MjA4OTU0NzU1NX0.TL2BzGqeb8GsWEsaCTwtzqKaKqB9l8ROdVap7rOPDZI';

const GAMEMODE_ICONS={'SMP':'smp.png','Pot':'pot.png','UHC':'uhc.webp','Vanilla':'vanilla.png','Sword':'sword.png','Axe':'axe.png','Mace':'mace.png','NethOP':'nethop.png','Spear Mace':'spearmace.png'};
const tierPoints={'HT1':60,'HT2':30,'HT3':10,'HT4':4,'HT5':2,'LT1':50,'LT2':10,'LT3':5,'LT4':3,'LT5':1};
const REGION_LINE={NA:'#ff6b35',EU:'#00ff88',AS:'#ff4757',AU:'#ffd700',SA:'#b06cff'};

let allPlayers=[];
let currentTab='Overall';
const skinErrors=new Set();

function getTierPts(t){return tierPoints[t]||0;}
function getTitle(pts){
  if(pts>=450)return 'Combat Grandmaster';
  if(pts>=270)return 'Combat Master';
  if(pts>=90)return 'Master Ace';
  if(pts>=45)return 'Combat Ace';
  return 'Rookie';
}
function getGamemodeTiers(p){
  const map={};
  (p.results||[]).forEach(r=>{map[r.gamemode]={tier:r.tierEarned,retired:false};});
  (p.retirements||[]).forEach(r=>{
    if(map[r.gamemode])map[r.gamemode].retired=true;
    else map[r.gamemode]={tier:r.tier,retired:true};
  });
  return map;
}
function sortedGamemodeTiers(gm){return Object.entries(gm).sort((a,b)=>getTierPts(b[1].tier)-getTierPts(a[1].tier));}
function calcPoints(p){return Object.values(getGamemodeTiers(p)).reduce((s,e)=>s+getTierPts(e.tier),0);}
function tierBadgeHTML(tier,retired,gm,showIcon){
  const label=retired?'R-'+tier:tier;
  const cls=retired?'tier-retired':'tier-'+tier;
  const icon=showIcon&&GAMEMODE_ICONS[gm]?'<img src="'+GAMEMODE_ICONS[gm]+'" style="width:12px;height:12px;object-fit:contain;image-rendering:pixelated;margin-right:3px;vertical-align:middle;" alt="'+gm+'">':'';
  return '<span class="tier-badge '+cls+'">'+icon+label+'</span>';
}
function skinURL(ign,size){return 'https://mc-heads.net/avatar/'+encodeURIComponent(ign)+'/'+size;}
function setSkinWithFallback(imgEl,ign,size){
  imgEl.src=skinErrors.has(ign.toLowerCase())?'https://mc-heads.net/avatar/Steve/'+size:skinURL(ign,size);
  imgEl.onerror=function(){this.onerror=null;skinErrors.add(ign.toLowerCase());this.src='https://mc-heads.net/avatar/Steve/'+size;};
}

async function fetchPlayers(){
  try{
    const res=await fetch(SB_URL+'/rest/v1/players?select=*&order=created_at.asc',{
      headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}
    });
    const data=await res.json();
    if(Array.isArray(data)&&data.length>0){
      allPlayers=data;
    } else {
      allPlayers=[];
    }
  }catch(e){
    console.error('Fetch error:',e);
    allPlayers=[];
  }
  if(currentTab==='Overall')renderOverall(allPlayers);
  else renderLeaderboard(allPlayers,currentTab);
}

function renderOverall(players,isSearch){
  const lb=document.getElementById('leaderboard');
  if(!players.length){lb.innerHTML='<div class="empty-state"><div class="icon">🏆</div><h3>No players yet</h3><p>Add players via the admin panel.</p></div>';return;}
  let display=[...players].sort((a,b)=>calcPoints(b)-calcPoints(a));
  if(!isSearch&&display.length>1000)display=display.slice(0,1000);
  const header='<div style="display:grid;grid-template-columns:60px 1fr 100px 120px 200px;padding:0.6rem 1.5rem;font-size:0.7rem;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);font-weight:600;margin-bottom:0.5rem;"><span>#</span><span>Player</span><span>Region</span><span>Points</span><span>Tiers</span></div>';
  const rows=display.map((p,i)=>{
    const rank=i+1;
    const rc=rank<=3?'rank-'+rank:'';
    const pts=calcPoints(p);
    const gmTiers=getGamemodeTiers(p);
    const badges=sortedGamemodeTiers(gmTiers).map(e=>tierBadgeHTML(e[1].tier,e[1].retired,e[0],true)).join('');
    return '<div class="player-row '+rc+'" onclick="openProfile(\''+p.ign+'\')" style="animation-delay:'+i*0.04+'s">'
      +'<span class="rank-num">'+rank+'</span>'
      +'<div class="player-info"><div class="player-avatar"><img src="'+skinURL(p.ign,40)+'" onerror="this.onerror=null;this.src=\'https://mc-heads.net/avatar/Steve/40\'"></div>'
      +'<div><div class="player-name">'+p.ign+'</div><div class="player-title">'+getTitle(pts)+'</div></div></div>'
      +'<span class="region-badge region-'+(p.region||'NA')+'">'+(p.region||'—')+'</span>'
      +'<span style="font-weight:700;color:var(--accent)">'+pts+'</span>'
      +'<div class="tier-badges">'+(badges||'—')+'</div></div>';
  }).join('');
  lb.innerHTML=header+rows;
}

function renderLeaderboard(players,tab,isSearch){
  const lb=document.getElementById('leaderboard');
  if(!players.length){lb.innerHTML='<div class="empty-state"><div class="icon">🏆</div><h3>No players yet</h3></div>';return;}
  const ht={1:[],2:[],3:[],4:[],5:[]};
  const lt={1:[],2:[],3:[],4:[],5:[]};
  players.forEach(p=>{
    const gmTiers=getGamemodeTiers(p);
    const entry=gmTiers[tab];
    if(!entry)return;
    const tier=entry.tier;
    const isHT=tier.startsWith('HT');
    const num=parseInt(tier.slice(2));
    if(isHT&&ht[num])ht[num].push({p,retired:entry.retired});
    else if(!isHT&&lt[num])lt[num].push({p,retired:entry.retired});
  });
  function pRow(item){
    const lc=REGION_LINE[item.p.region||'NA']||'#888';
    const rm=item.retired?'<span style="font-size:0.6rem;color:var(--muted);margin-left:3px">[R]</span>':'';
    return '<div class="tier-player" onclick="openProfile(\''+item.p.ign+'\')" style="border-left:3px solid '+lc+'">'
      +'<div class="tier-player-avatar"><img src="'+skinURL(item.p.ign,30)+'" onerror="this.onerror=null;this.src=\'https://mc-heads.net/avatar/Steve/30\'"></div>'
      +'<span class="tier-player-name">'+item.p.ign+rm+'</span>'
      +'<span class="tier-chevron">&#x276F;&#x276F;</span></div>';
  }
  function col(num){
    const icon=num===1?'🏆 ':num===2?'🥈 ':num===3?'🥉 ':'';
    const htRows=ht[num].length?ht[num].map(pRow).join(''):'<div class="tier-empty">—</div>';
    const ltRows=lt[num].length?lt[num].map(pRow).join(''):'<div class="tier-empty">—</div>';
    return '<div class="tier-col"><div class="tier-col-header tier-col-HT">'+icon+'Tier '+num+'</div><div class="tier-col-body">'+htRows+'</div><div class="tier-col-header tier-col-LT">Tier '+num+'</div><div class="tier-col-body">'+ltRows+'</div></div>';
  }
  lb.innerHTML='<div class="tier-columns">'+[1,2,3,4,5].map(col).join('')+'</div>';
}

function switchTab(tab,btn){
  currentTab=tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('currentTabLabel').textContent=tab==='Overall'?'Overall Rankings':tab+' Rankings';
  if(tab==='Overall')renderOverall(allPlayers);
  else renderLeaderboard(allPlayers.filter(p=>getGamemodeTiers(p)[tab]),tab);
}

function filterPlayers(){
  const q=document.getElementById('searchInput').value.toLowerCase();
  if(q){
    const exact=allPlayers.find(p=>p.ign.toLowerCase()===q);
    if(exact)openProfile(exact.ign);
    const filtered=allPlayers.filter(p=>p.ign.toLowerCase().includes(q));
    if(currentTab==='Overall')renderOverall(filtered,true);
    else renderLeaderboard(filtered,currentTab,true);
  }else{
    if(currentTab==='Overall')renderOverall(allPlayers,false);
    else renderLeaderboard(allPlayers,currentTab,false);
  }
}

function openProfile(ign){
  const p=allPlayers.find(x=>x.ign===ign);
  if(!p)return;
  setSkinWithFallback(document.getElementById('modalAvatar'),p.ign,80);
  document.getElementById('modalName').innerHTML=p.ign+(p.retired?'<span class="retired-badge">RETIRED</span>':'');
  const pts=calcPoints(p);
  document.getElementById('modalTitleBadge').textContent=getTitle(pts);
  document.getElementById('modalRegion').textContent=p.region||'—';
  document.getElementById('modalPoints').textContent=pts;
  const sorted=sortedGamemodeTiers(getGamemodeTiers(p));
  document.getElementById('modalGamemodeTiers').innerHTML=sorted.map(entry=>{
    const gm=entry[0],tier=entry[1].tier,ret=entry[1].retired;
    const icon=GAMEMODE_ICONS[gm]?'<img src="'+GAMEMODE_ICONS[gm]+'" alt="'+gm+'">':'⚔️';
    return '<div class="gamemode-tier-row"><span class="gamemode-label">'+icon+' '+gm+'</span>'+tierBadgeHTML(tier,ret,gm,false)+'</div>';
  }).join('')||'<div style="color:var(--muted);font-size:0.85rem">No results yet</div>';
  document.getElementById('modalOverlay').classList.add('open');
}
function closeModal(e){if(e.target===document.getElementById('modalOverlay'))closeModalBtn();}
function closeModalBtn(){document.getElementById('modalOverlay').classList.remove('open');}

fetchPlayers();
setInterval(fetchPlayers,15000);
</script>
