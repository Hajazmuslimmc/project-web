name: Build and Release Starlight Client

on:
  push:
    branches: [ 'starlight-client' ]
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build with Gradle
        uses: gradle/gradle-build-action@v2
        with:
          arguments: 'clean build -Dmc=1.21.4'

      - name: Package artifacts
        run: |
          mkdir -p release
          zip -j release/starlight-client-1.21.4.zip starlight-client-mod/build/libs/*.jar starlight-client-mod/README.md || true

      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        with:
          tag_name: v0.1.0-1.21.4
          release_name: Starlight Client v0.1.0 (1.21.4)
          body: |
            Built Starlight Client mod for Minecraft 1.21.4. Download the attached ZIP and follow the README to install.
          draft: false
          prerelease: false

      - name: Upload release asset
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: release/starlight-client-1.21.4.zip
          asset_name: starlight-client-1.21.4.zip
          asset_content_type: application/zip
